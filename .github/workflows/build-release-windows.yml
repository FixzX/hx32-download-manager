name: Build Windows executable and release

on:
  push:
    tags:
      - 'v3.0.0'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release'
        required: true
        default: 'v3.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      - name: Build executable
        run: |
          pyinstaller --onefile --name hx32-download-manager hx32_download_manager.py
      - name: Create or update GitHub Release
        id: create_release
        uses: softprops/turnstyle@v1
        with:
          tag: ${{ github.event.inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Ensure release exists
        id: ensure_release
        run: |
          TAG=${{ github.event.inputs.tag }}
          gh release view "$TAG" || gh release create "$TAG" --title "HX32 Download Manager $TAG" --notes "Release $TAG — Windows executable and Debian package (if present)."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload exe to release
        uses: softprops/action-upload-release-asset@v1
        with:
          upload_url: ${{ steps.ensure_release.outputs.upload_url || '' }}
          asset_path: dist/hx32-download-manager.exe
          asset_name: hx32-download-manager_3.0.0_windows_x86_64.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Debian package
        run: |
          sudo apt-get update && sudo apt-get install -y python3 python3-gi python3-gi-cairo gir1.2-gtk-4.0
          dpkg-deb --build debian hx32-download-manager_3.0.0_amd64.deb
      - name: Upload deb to release
        uses: softprops/action-upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: hx32-download-manager_3.0.0_amd64.deb
          asset_name: hx32-download-manager_3.0.0_amd64.deb
          asset_content_type: application/vnd.debian.binary-package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
